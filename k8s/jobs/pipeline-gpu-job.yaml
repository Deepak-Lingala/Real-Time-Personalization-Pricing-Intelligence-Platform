apiVersion: batch/v1
kind: Job
metadata:
  name: personalization-pricing-gpu-pipeline
  namespace: personalization-pricing
  labels:
    app.kubernetes.io/name: personalization-pricing-gpu-pipeline
    app.kubernetes.io/part-of: real-time-personalization-pricing-platform
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: personalization-pricing-gpu-pipeline
        app.kubernetes.io/part-of: real-time-personalization-pricing-platform
    spec:
      restartPolicy: Never
      securityContext:
        fsGroup: 1000
      containers:
        - name: gpu-pipeline
          image: real-time-personalization-pricing-platform:gpu
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - >
              python3 scripts/run_pipeline.py
              --users ${N_USERS}
              --products ${N_PRODUCTS}
              --events ${N_EVENTS}
              --days ${TRAINING_WINDOW_DAYS}
              --retrieval-backend torch
              --ranking-backend xgboost
              --pricing-backend xgboost
              --forecasting-backend lightgbm
              --retrieval-epochs ${RETRIEVAL_EPOCHS}
              --retrieval-batch-size ${RETRIEVAL_BATCH_SIZE}
          envFrom:
            - configMapRef:
                name: platform-runtime-config
          resources:
            requests:
              cpu: "2"
              memory: 6Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 12Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: data-artifacts
              mountPath: /app/data/raw
              subPath: raw
            - name: data-artifacts
              mountPath: /app/data/processed
              subPath: processed
            - name: data-artifacts
              mountPath: /app/data/synthetic
              subPath: synthetic
            - name: data-artifacts
              mountPath: /app/data/feature_store
              subPath: feature_store
            - name: model-artifacts
              mountPath: /app/models
      volumes:
        - name: data-artifacts
          persistentVolumeClaim:
            claimName: platform-data-pvc
        - name: model-artifacts
          persistentVolumeClaim:
            claimName: platform-models-pvc
