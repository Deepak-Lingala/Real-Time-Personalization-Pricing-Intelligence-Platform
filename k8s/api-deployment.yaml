apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing-intelligence-api
  namespace: personalization-pricing
  labels:
    app.kubernetes.io/name: pricing-intelligence-api
    app.kubernetes.io/part-of: real-time-personalization-pricing-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pricing-intelligence-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pricing-intelligence-api
        app.kubernetes.io/part-of: real-time-personalization-pricing-platform
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: api
          image: real-time-personalization-pricing-platform:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn"]
          args: ["api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef:
                name: platform-runtime-config
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data-artifacts
              mountPath: /app/data/processed
              subPath: processed
            - name: data-artifacts
              mountPath: /app/data/feature_store
              subPath: feature_store
            - name: model-artifacts
              mountPath: /app/models
      volumes:
        - name: data-artifacts
          persistentVolumeClaim:
            claimName: platform-data-pvc
        - name: model-artifacts
          persistentVolumeClaim:
            claimName: platform-models-pvc
